services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://taskify:taskify@db:5432/taskify
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskify
      POSTGRES_PASSWORD: taskify
      POSTGRES_DB: taskify
    ports:
      - "5432:5432"
    volumes:
      - taskify_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  taskify_pgdata: